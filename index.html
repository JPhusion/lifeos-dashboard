<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #e0e0e0;
            min-height: 100vh; padding: 24px;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid #2a2a2a;
        }
        header h1 { font-size: 1.6rem; font-weight: 600; color: #fff; }
        .meta { font-size: 0.8rem; color: #666; }
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-bottom: 32px;
        }
        .stat-card {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
            padding: 16px; text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #fff; }
        .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
        .filters {
            display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .filters button {
            background: #1a1a1a; border: 1px solid #333; color: #aaa;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.15s;
        }
        .filters button:hover { border-color: #555; color: #fff; }
        .filters button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
        .task-list { display: flex; flex-direction: column; gap: 8px; }
        .task {
            display: grid; grid-template-columns: auto 1fr auto auto auto;
            align-items: center; gap: 12px;
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
            padding: 14px 16px; transition: border-color 0.15s;
        }
        .task:hover { border-color: #444; }
        .priority-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .priority-dot.critical { background: #ef4444; }
        .priority-dot.high { background: #f59e0b; }
        .priority-dot.medium { background: #3b82f6; }
        .priority-dot.low { background: #6b7280; }
        .task-title { font-size: 0.9rem; }
        .task-title.done { text-decoration: line-through; color: #555; }
        .badge {
            font-size: 0.65rem; padding: 3px 8px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
        }
        .badge.work { background: #1e3a5f; color: #60a5fa; }
        .badge.personal { background: #3b1f3b; color: #c084fc; }
        .status-badge {
            font-size: 0.65rem; padding: 3px 8px; border-radius: 4px;
            font-weight: 600; text-transform: uppercase;
        }
        .status-badge.todo { background: #1a1a2e; color: #818cf8; }
        .status-badge.in_progress { background: #1a2e1a; color: #4ade80; }
        .status-badge.done { background: #2a2a2a; color: #666; }
        .status-badge.cancelled { background: #2a1a1a; color: #f87171; }
        .due { font-size: 0.75rem; color: #666; }
        .due.overdue { color: #ef4444; }
        .empty { text-align: center; padding: 48px; color: #555; }
        @media (max-width: 600px) {
            .task { grid-template-columns: auto 1fr; gap: 8px; }
            .badge, .status-badge, .due { grid-column: 2; }
        }
    </style>
</head>
<body>
    <header>
        <h1>LifeOS Dashboard</h1>
        <div class="meta">
            <span id="update-time">Loading...</span> &middot;
            <span id="task-count">0</span> tasks
        </div>
    </header>
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters"></div>
    <div class="task-list" id="task-list"></div>

    <script>
        let allTasks = [];
        let activeFilter = 'all';

        async function loadData() {
            try {
                const resp = await fetch('data.json');
                if (!resp.ok) throw new Error('No data.json found');
                const data = await resp.json();
                allTasks = data.tasks || [];
                document.getElementById('update-time').textContent =
                    'Updated ' + new Date(data.last_updated).toLocaleString();
                document.getElementById('task-count').textContent = data.task_count;
                renderStats();
                renderFilters();
                renderTasks();
            } catch (e) {
                document.getElementById('task-list').innerHTML =
                    '<div class="empty">No data available yet. Tasks will appear once the sync script runs.</div>';
            }
        }

        function renderStats() {
            const stats = document.getElementById('stats');
            const active = allTasks.filter(t => t.status !== 'done' && t.status !== 'cancelled');
            const done = allTasks.filter(t => t.status === 'done');
            const overdue = active.filter(t => t.due_date && new Date(t.due_date) < new Date());
            const critical = active.filter(t => t.priority === 'critical' || t.priority === 'high');
            stats.innerHTML = [
                { value: active.length, label: 'Active' },
                { value: done.length, label: 'Completed' },
                { value: overdue.length, label: 'Overdue' },
                { value: critical.length, label: 'High Priority' },
            ].map(s => `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`).join('');
        }

        function renderFilters() {
            const container = document.getElementById('filters');
            const filters = ['all', 'todo', 'in_progress', 'done', 'work', 'personal'];
            container.innerHTML = filters.map(f =>
                `<button class="${f === activeFilter ? 'active' : ''}" onclick="setFilter('${f}')">${f.replace('_', ' ')}</button>`
            ).join('');
        }

        function setFilter(f) {
            activeFilter = f;
            renderFilters();
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            let tasks = allTasks;
            if (['todo', 'in_progress', 'done', 'cancelled'].includes(activeFilter)) {
                tasks = tasks.filter(t => t.status === activeFilter);
            } else if (['work', 'personal'].includes(activeFilter)) {
                tasks = tasks.filter(t => t.area === activeFilter);
            }
            if (!tasks.length) {
                container.innerHTML = '<div class="empty">No tasks match this filter.</div>';
                return;
            }
            container.innerHTML = tasks.map(t => {
                const isOverdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'done';
                return `<div class="task">
                    <span class="priority-dot ${t.priority}"></span>
                    <span class="task-title ${t.status === 'done' ? 'done' : ''}">${esc(t.title)}</span>
                    <span class="badge ${t.area}">${t.area}</span>
                    <span class="status-badge ${t.status}">${t.status.replace('_', ' ')}</span>
                    <span class="due ${isOverdue ? 'overdue' : ''}">${t.due_date || ''}</span>
                </div>`;
            }).join('');
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
